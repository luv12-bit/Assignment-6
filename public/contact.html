<!DOCTYPE html>
<html>
<head>
    <title>Contact Me</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>Get In Touch</h1>
    </header>

    <nav>
        <a href="/home">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
    </nav>

    <main>
        <h2>Send a Message</h2>
        <p>If you have any questions about my project, please use the form below!</p>
        
        <form>
            <label>Name:</label><br>
            <input type="text" name="name" placeholder="Your Name"><br>
            
            <label>Email:</label><br>
            <input type="email" name="email" placeholder="Your Email"><br>
            
            <label>Message:</label><br>
            <textarea name="message" rows="4" placeholder="Your Message"></textarea><br>
            
            <button type="button">Submit Message</button>
        </form>
    </main>

    <footer>
        <p>Made by a student learning Node.js - 2026</p>
    </footer>
</body>
</html>
